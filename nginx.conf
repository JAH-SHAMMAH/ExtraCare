# Fairview School Portal — production reverse proxy + TLS.
# Mounted at /etc/nginx/conf.d/default.conf by docker-compose.prod.yml.
#
# Single-domain routing:  https://fairviewschoolng.com  -> Next.js frontend
#                         https://fairviewschoolng.com/api/... -> FastAPI
# So NEXT_PUBLIC_API_URL = https://fairviewschoolng.com (lib/api.ts appends /api/v1).
#
# Certificates: place fullchain.pem + privkey.pem in ./certs (Let's Encrypt /
# Certbot or your CA). Adjust server_name to your real domain.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream fairview_api { server api:8000; }
upstream fairview_web { server web:3000; }

# ── HTTP -> HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80;
    server_name fairviewschoolng.com www.fairviewschoolng.com;

    # ACME http-01 challenge (certbot webroot), if used.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / { return 301 https://$host$request_uri; }
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name fairviewschoolng.com www.fairviewschoolng.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25m;   # avatars, lesson media, CSV imports, recordings

    # API -> FastAPI backend (serves /api/v1/*)
    location /api/ {
        proxy_pass http://fairview_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;       # messenger / live WS
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 300s;
    }

    # Uploaded media is served by the API.
    location /uploads/ {
        proxy_pass http://fairview_api;
        proxy_set_header Host $host;
    }

    # Everything else -> Next.js frontend.
    location / {
        proxy_pass http://fairview_web;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
    }
}
